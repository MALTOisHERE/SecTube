services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-/api}
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - sectube-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    environment:
      # Core Server Settings
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=5000
      - BACKEND_URL=${BACKEND_URL:-http://backend:5000}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost}

      # Database
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongodb:27017/sectube}

      # Authentication (JWT)
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRE=${JWT_EXPIRE:-7d}

      # OAuth/SSO (Optional)
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}

      # Security & Rate Limiting
      - FORGOT_PASSWORD_LIMIT=${FORGOT_PASSWORD_LIMIT:-3}
      - FORGOT_PASSWORD_WINDOW_MINS=${FORGOT_PASSWORD_WINDOW_MINS:-15}

      # Email Services
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_EMAIL=${SMTP_EMAIL:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - FROM_EMAIL=${FROM_EMAIL:-noreply@sectube.com}
      - FROM_NAME=${FROM_NAME:-SecTube}

      # Cloud Storage (Cloudinary)
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME:-}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY:-}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET:-}

      # Local File Storage & Processing
      - UPLOAD_PATH=${UPLOAD_PATH:-./uploads}
      - VIDEO_PATH=${VIDEO_PATH:-./videos}
      - THUMBNAIL_PATH=${THUMBNAIL_PATH:-./thumbnails}
      - FFMPEG_PATH=/usr/bin/ffmpeg
      - FFPROBE_PATH=/usr/bin/ffprobe

      # Upload Constraints
      - MAX_VIDEO_SIZE=${MAX_VIDEO_SIZE:-5368709120}
      - MAX_IMAGE_SIZE=${MAX_IMAGE_SIZE:-5242880}
      - VIDEO_QUALITIES=${VIDEO_QUALITIES:-360p,480p,720p,1080p}

      # AI & MCP Configuration
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - CHAT_MODEL=${CHAT_MODEL:-anthropic/claude-3.5-sonnet}
    volumes:
      - backend-uploads:/app/uploads
      - backend-videos:/app/videos
      - backend-thumbnails:/app/thumbnails
      - backend-avatars:/app/avatars
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - sectube-network

  mongodb:
    image: mongo:latest
    ports:
      - "${MONGODB_PORT:-27017}:27017"
    environment:
      - MONGO_INITDB_DATABASE=sectube
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - sectube-network

networks:
  sectube-network:
    driver: bridge

volumes:
  backend-uploads:
  backend-videos:
  backend-thumbnails:
  backend-avatars:
  mongodb-data:
